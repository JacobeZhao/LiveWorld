apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liveworld-hpa
  namespace: liveworld
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liveworld
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-minute cool-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: liveworld-pdb
  namespace: liveworld
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: liveworld
