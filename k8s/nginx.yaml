apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: liveworld
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 65536;
        multi_accept on;
    }

    http {
        upstream liveworld_ws {
            least_conn;
            server liveworld-ws.liveworld.svc.cluster.local:8080;
            keepalive 256;
        }

        upstream liveworld_http {
            server liveworld-http.liveworld.svc.cluster.local:8081;
            keepalive 64;
        }

        limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;
        limit_conn_zone $binary_remote_addr zone=addr:10m;

        server {
            listen 80;
            server_name _;

            location /ws {
                limit_req zone=ws_limit burst=20 nodelay;
                limit_conn addr 50;

                proxy_pass http://liveworld_ws;
                proxy_http_version 1.1;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host       $host;
                proxy_set_header X-Real-IP  $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                proxy_read_timeout  86400s;
                proxy_send_timeout  86400s;
                proxy_buffering     off;
            }

            location /metrics {
                allow 10.0.0.0/8;
                allow 172.16.0.0/12;
                allow 192.168.0.0/16;
                deny all;
                proxy_pass http://liveworld_http/metrics;
            }

            location / {
                proxy_pass http://liveworld_http;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: liveworld
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: liveworld
  labels:
    app: nginx
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer
