apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: liveworld
  namespace: liveworld
  labels:
    app: liveworld
spec:
  replicas: 2
  serviceName: liveworld-headless      # required for StatefulSet DNS
  selector:
    matchLabels:
      app: liveworld
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0                # zero-downtime rollout
  podManagementPolicy: Parallel        # scale up/down pods concurrently
  template:
    metadata:
      labels:
        app: liveworld
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8081"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: liveworld
          image: ghcr.io/jacobezhao/liveworld:latest   # update to your registry
          imagePullPolicy: Always
          ports:
            - name: websocket
              containerPort: 8080
              protocol: TCP
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: liveworld-config
            - secretRef:
                name: liveworld-secrets
          resources:
            requests:
              cpu:    "500m"
              memory: "256Mi"
            limits:
              cpu:    "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /app/data
  # Per-pod PVC: each StatefulSet pod gets its own snapshot volume.
  # ReadWriteOnce is fine because only one pod mounts each volume.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
