name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping LiveWorld Space
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jacobezhao-liveworld.hf.space/health)
          echo "Health check status: $STATUS"
