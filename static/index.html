<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveWorld — Tactical AI World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #070a0f;
  --surface:  #0d1020;
  --border:   rgba(80,120,200,0.18);
  --accent:   #4a8fff;
  --gold:     #e8b840;
  --green:    #38d890;
  --red:      #ff4455;
  --text:     #c8d4f0;
  --muted:    #4a5880;
  --tile:     52px;
  --sidebar:  264px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300}

/* ── Layout ── */
#app{display:flex;flex-direction:column;width:100%;height:100%}
#topbar{height:32px;display:flex;align-items:center;gap:12px;padding:0 12px;background:#050810;border-bottom:1px solid var(--border);flex-shrink:0;font-size:.68rem;color:var(--muted);font-family:'Share Tech Mono',monospace}
#topbar .logo{font-family:'Cinzel',serif;font-size:.85rem;font-weight:600;color:var(--gold);letter-spacing:.08em;margin-right:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;transition:.3s}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#topbar .sep{color:var(--border);margin:0 4px}
#topbar .ml{margin-left:auto}
#gamebody{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:.78rem;font-family:'Inter',sans-serif;outline:none;width:100%;transition:.2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
select option{background:#0d1020}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn{width:100%;padding:7px;border:none;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.06em;transition:.2s;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,#3060cc,#6090ff);color:#fff;box-shadow:0 2px 10px rgba(60,100,255,.3)}
.btn-primary:hover:not(:disabled){filter:brightness(1.15)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.btn-ghost:disabled{opacity:.25;cursor:not-allowed}

/* ── Player status ── */
#sb-status{display:none}
.status-lv{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-align:center;margin-bottom:10px}
.bar-row{margin-bottom:6px}
.bar-label{display:flex;justify-content:space-between;font-size:.62rem;color:var(--muted);margin-bottom:2px;font-family:'Share Tech Mono',monospace}
.bar-bg{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-hp{background:linear-gradient(90deg,#ff4455,#38d890)}
.bar-xp{background:linear-gradient(90deg,#4a8fff,#e8b840)}

/* ── Selected unit ── */
#sb-unit{display:none}
.unit-card{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px}
.unit-emoji{font-size:2rem;text-align:center;margin-bottom:4px}
.unit-name{font-family:'Cinzel',serif;font-size:.85rem;color:var(--text);text-align:center}
.unit-sub{font-size:.65rem;color:var(--muted);text-align:center;margin-bottom:8px}
.unit-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.65rem;font-family:'Share Tech Mono',monospace}
.unit-stat{background:rgba(255,255,255,.04);border-radius:4px;padding:4px 6px}
.unit-stat span{color:var(--gold)}

/* ── Territory ── */
.zone-rows{display:flex;flex-direction:column;gap:3px}
.zone-row{display:flex;justify-content:space-between;align-items:center;font-size:.65rem;padding:2px 0}
.zone-name{color:var(--muted)}
.zone-tag{font-size:.7rem;font-weight:500}

/* ── Event log ── */
#sb-log{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin}
#sb-log::-webkit-scrollbar{width:3px}
#sb-log::-webkit-scrollbar-thumb{background:var(--border)}
.log-line{font-size:.65rem;line-height:1.5;margin-bottom:2px;font-family:'Share Tech Mono',monospace;color:var(--muted)}
.log-line.evt{color:var(--accent)}
.log-line.combat{color:#ff9955}
.log-line.capture{color:#88dd55}
.log-line.death{color:var(--red)}
.log-line.levelup{color:var(--gold)}
.log-line.chat{color:#88ddff}
.log-line.err{color:var(--red)}

/* ── Chat ── */
.chat-row{display:flex;gap:6px}
.chat-row input{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:.78rem;outline:none}
.chat-row input:focus{border-color:var(--accent)}
.chat-btn{background:rgba(74,143,255,.15);border:1px solid rgba(74,143,255,.3);color:var(--accent);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.9rem}
.chat-btn:hover{background:rgba(74,143,255,.28)}

/* ── Map area ── */
#mapwrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#grid{display:block;cursor:crosshair;image-rendering:pixelated}

/* ── World event banner ── */
#banner{position:absolute;top:10px;left:50%;transform:translateX(-50%) translateY(-10px);max-width:500px;padding:8px 20px;border-radius:8px;font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.04em;text-align:center;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:20;border:1px solid;backdrop-filter:blur(10px);white-space:nowrap}
#banner.show{opacity:1;transform:translateX(-50%) translateY(0)}
#banner.combat{background:rgba(60,5,5,.92);border-color:rgba(255,68,85,.5);color:#ffaaaa}
#banner.capture{background:rgba(5,35,5,.92);border-color:rgba(80,200,60,.4);color:#aaff88}
#banner.death{background:rgba(30,5,40,.92);border-color:rgba(140,60,220,.4);color:#cc88ff}
#banner.levelup{background:rgba(35,25,0,.92);border-color:rgba(232,184,64,.6);color:#ffe060}
#banner.event{background:rgba(5,15,35,.92);border-color:rgba(74,143,255,.4);color:#88bbff}

/* ── Minimap ── */
#minimap{position:absolute;bottom:12px;right:12px;width:110px;height:110px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#050810}

/* ── Nav hint ── */
#navhint{position:absolute;bottom:12px;left:12px;font-size:.62rem;color:var(--muted);font-family:'Share Tech Mono',monospace;background:rgba(5,8,16,.8);border:1px solid var(--border);border-radius:6px;padding:4px 8px}

/* ── Coord display ── */
#coords{position:absolute;top:8px;right:8px;font-size:.65rem;color:var(--muted);font-family:'Share Tech Mono',monospace;background:rgba(5,8,16,.75);border:1px solid var(--border);border-radius:4px;padding:3px 7px}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span class="logo">⚔ LIVEWORLD</span>
    <span class="sep">|</span>
    <span class="dot" id="dot"></span><span id="st-text">connecting</span>
    <span class="sep">|</span>
    <span id="st-tick">TICK —</span>
    <span class="sep">|</span>
    <span id="st-actors">— actors</span>
    <span id="st-uptime" class="ml">uptime —</span>
  </div>

  <div id="gamebody">

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Character creation -->
      <div class="sb-section" id="sb-create">
        <div class="sb-title">⚙ Deploy Unit</div>
        <div class="field"><label>Call Sign</label><input id="inp-name" value="Wanderer" maxlength="64"></div>
        <div class="field"><label>Personality</label><input id="inp-personality" value="curious explorer" maxlength="256"></div>
        <div class="field"><label>Backstory</label><input id="inp-backstory" value="A traveler from distant lands" maxlength="512"></div>
        <div class="field-row">
          <div class="field"><label>Class</label>
            <select id="inp-role">
              <option value="Wanderer">🗺 Wanderer</option>
              <option value="Knight">⚔ Knight</option>
              <option value="Mage">✨ Mage</option>
              <option value="Scholar">📚 Scholar</option>
              <option value="Merchant">💰 Merchant</option>
              <option value="Bard">🎵 Bard</option>
              <option value="Guard">🛡 Guard</option>
            </select>
          </div>
          <div class="field"><label>Faction</label>
            <select id="inp-faction">
              <option value="Neutral">⚪ Neutral</option>
              <option value="Empire">🔴 Empire</option>
              <option value="Alliance">🔵 Alliance</option>
              <option value="WanderersGuild">🟣 Wanderers</option>
              <option value="MagesCircle">🩵 Mages</option>
            </select>
          </div>
        </div>
        <div class="field"><label>AI Core</label>
          <select id="inp-model">
            <option value="Mock" selected>✦ Mock (instant)</option>
            <option value="Gpt4o">⚡ GPT-4o</option>
            <option value="ClaudeSonnet">✧ Claude Sonnet</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-join" onclick="joinWorld()">▶ DEPLOY</button>
        <button class="btn btn-ghost" id="btn-leave" onclick="leaveWorld()" disabled>■ WITHDRAW</button>
      </div>

      <!-- Player status -->
      <div class="sb-section" id="sb-status">
        <div class="sb-title">⚡ Unit Status</div>
        <div class="status-lv" id="pl-lv">Level 1</div>
        <div class="bar-row">
          <div class="bar-label"><span>HP</span><span id="pl-hp-text">—</span></div>
          <div class="bar-bg"><div class="bar-fill bar-hp" id="pl-hp" style="width:100%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span>XP</span><span id="pl-xp-text">—</span></div>
          <div class="bar-bg"><div class="bar-fill bar-xp" id="pl-xp" style="width:0%"></div></div>
        </div>
      </div>

      <!-- Selected unit info -->
      <div class="sb-section" id="sb-unit">
        <div class="sb-title">📋 Unit Info</div>
        <div class="unit-card">
          <div class="unit-emoji" id="u-emoji">—</div>
          <div class="unit-name" id="u-name">—</div>
          <div class="unit-sub" id="u-sub">—</div>
          <div class="unit-stats">
            <div class="unit-stat">HP <span id="u-hp">—</span></div>
            <div class="unit-stat">LV <span id="u-lv">—</span></div>
            <div class="unit-stat">XP <span id="u-xp">—</span></div>
            <div class="unit-stat">⚔ <span id="u-atk">—</span></div>
          </div>
        </div>
      </div>

      <!-- Territory -->
      <div class="sb-section">
        <div class="sb-title">🗺 Territory</div>
        <div class="zone-rows">
          <div class="zone-row"><span class="zone-name">N. Forest</span><span class="zone-tag" id="tz-NorthForest">—</span></div>
          <div class="zone-row"><span class="zone-name">E. Desert</span><span class="zone-tag" id="tz-EastDesert">—</span></div>
          <div class="zone-row"><span class="zone-name">W. Coast</span><span class="zone-tag" id="tz-WestCoast">—</span></div>
          <div class="zone-row"><span class="zone-name">S. Plains</span><span class="zone-tag" id="tz-SouthPlain">—</span></div>
          <div class="zone-row"><span class="zone-name">Central City</span><span class="zone-tag" id="tz-CentralCity">—</span></div>
          <div class="zone-row"><span class="zone-name">Mtn. Border</span><span class="zone-tag" id="tz-MountainBorder">—</span></div>
        </div>
      </div>

      <!-- Chat -->
      <div class="sb-section">
        <div class="sb-title">💬 Comms</div>
        <div class="chat-row">
          <input id="inp-chat" placeholder="Broadcast…" maxlength="300" onkeydown="if(event.key==='Enter')sendChat()">
          <button class="chat-btn" onclick="sendChat()">➤</button>
        </div>
      </div>

      <!-- Event log -->
      <div id="sb-log"></div>

    </div><!-- /sidebar -->

    <!-- Map -->
    <div id="mapwrap">
      <canvas id="grid"></canvas>
      <canvas id="minimap"></canvas>
      <div id="banner"></div>
      <div id="coords">col:— row:—</div>
      <div id="navhint">WASD / ↑↓←→ scroll · Click to move · Scroll zoom</div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════════════
function getUrls() {
  const proto = window.location.protocol;
  const host  = window.location.hostname;
  const local = host === 'localhost' || host === '127.0.0.1';
  const wp    = proto === 'https:' ? 'wss' : 'ws';
  return {
    ws:   `${wp}://${host}${local ? ':8080' : ''}`,
    http: local ? 'http://localhost:8080' : window.location.origin,
  };
}
const { ws: WS_URL, http: HTTP_URL } = getUrls();

// ── Grid constants ────────────────────────────────────
const WORLD_SIZE  = 10000;
const WORLD_TILE  = 200;        // world units per display cell
const MAP_COLS    = 50;         // WORLD_SIZE / WORLD_TILE
const MAP_ROWS    = 50;
let   TILE        = 52;         // px per cell, adjustable

// ── Visual data ───────────────────────────────────────
const FACTION_COLOR = {
  Empire:'#ff4444', Alliance:'#4488ff',
  WanderersGuild:'#aa44ff', MagesCircle:'#44ffee', Neutral:'#888888',
};
const FACTION_EMOJI = {
  Empire:'🔴', Alliance:'🔵', WanderersGuild:'🟣', MagesCircle:'🩵', Neutral:'⚪',
};
const FACTION_NAME = {
  Empire:'Empire', Alliance:'Alliance',
  WanderersGuild:'Wanderers', MagesCircle:'Mages', Neutral:'Neutral',
};
const ROLE_STYLE = {
  Wanderer:{ emoji:'🗺', color:'#38d890' },
  Merchant:{ emoji:'💰', color:'#e8b840' },
  Scholar: { emoji:'📚', color:'#88aaff' },
  Knight:  { emoji:'⚔',  color:'#ff8844' },
  Mage:    { emoji:'✨', color:'#cc88ff' },
  Bard:    { emoji:'🎵', color:'#ff88cc' },
  Guard:   { emoji:'🛡',  color:'#aaaaaa' },
};

function zoneOf(wx, wy) {
  if (wx >= 3500 && wx <= 6500 && wy >= 3500 && wy <= 6500) return 'CentralCity';
  if (wx <= 4000 && wy <= 4000) return 'NorthForest';
  if (wx >= 6000 && wy <= 4000) return 'EastDesert';
  if (wx <= 3000 && wy >= 6000) return 'WestCoast';
  if (wx >= 3000 && wx <= 7000 && wy >= 6000) return 'SouthPlain';
  if (wx >= 7000 && wy >= 5000) return 'MountainBorder';
  return 'Wilderness';
}
const ZONE_TERRAIN = {
  NorthForest:    { bg:'#0c1e14', dim:'#142a1c', emoji:'🌲' },
  EastDesert:     { bg:'#1e1408', dim:'#2a1e0e', emoji:'🏜' },
  WestCoast:      { bg:'#080c1a', dim:'#0e1428', emoji:'🌊' },
  SouthPlain:     { bg:'#101a08', dim:'#182610', emoji:'🌾' },
  MountainBorder: { bg:'#181010', dim:'#221616', emoji:'⛰' },
  CentralCity:    { bg:'#0e1018', dim:'#161824', emoji:'🏙' },
  Wilderness:     { bg:'#090b10', dim:'#0f1118', emoji:'·'  },
};

const ZONE_LABEL_TO_ID = {
  'Northern Forest':'NorthForest','Eastern Desert':'EastDesert',
  'Western Coast':'WestCoast','Southern Plains':'SouthPlain',
  'Central City':'CentralCity','Mountain Border':'MountainBorder',
  'Wilderness':'Wilderness',
};

const territory = {
  NorthForest:'Empire', EastDesert:'WanderersGuild',
  WestCoast:'Alliance', SouthPlain:'Alliance',
  CentralCity:'Neutral', MountainBorder:'Empire', Wilderness:'Neutral',
};

// ══════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════
let ws = null, myActorId = null;
let actors = new Map();        // id → actor data
let cellMap = new Map();       // "col,row" → actor[] (rebuilt each render)

let canvas, ctx, mm, mctx;
let mapW, mapH;                // canvas pixel size

// Viewport: top-left corner in grid coords
let vCol = 13, vRow = 13;      // start near center (25,25) minus half viewport

let selectedActor = null;
let cursorCol = -1, cursorRow = -1;

let combatFlashes = [];        // {col, row, born}
let floatingNums  = [];        // {wx, wy, text, born}
let bannerTimer   = null;

// Key state for smooth panning
const keys = {};
let keyPanAccum = 0;

// ══════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  canvas = document.getElementById('grid');
  ctx    = canvas.getContext('2d');
  mm     = document.getElementById('minimap');
  mctx   = mm.getContext('2d');
  mm.width = mm.height = 110;

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('click', onMapClick);
  canvas.addEventListener('mousemove', onMapMove);
  canvas.addEventListener('mouseleave', () => { cursorCol = -1; cursorRow = -1; });
  canvas.addEventListener('wheel', onWheel, { passive: false });
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    // Also instant scroll for arrow keys
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  renderTerritoryPanel();
  requestAnimationFrame(loop);
  pollMetrics();
  connectWS();
});

function resize() {
  const wrap = document.getElementById('mapwrap');
  mapW = wrap.clientWidth;
  mapH = wrap.clientHeight;
  canvas.width  = mapW;
  canvas.height = mapH;
}

function visibleCols() { return Math.ceil(mapW / TILE) + 1; }
function visibleRows() { return Math.ceil(mapH / TILE) + 1; }

// ══════════════════════════════════════════════════════
// WebSocket
// ══════════════════════════════════════════════════════
function connectWS() {
  setStatus('connecting', false);
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen  = () => { setStatus('connected', true); addLog('Connected to LiveWorld', 'evt'); };
  ws.onclose = () => {
    setStatus('offline', false);
    myActorId = null;
    addLog('Disconnected — reconnecting…', 'err');
    document.getElementById('btn-join').disabled = false;
    document.getElementById('btn-leave').disabled = true;
    document.getElementById('sb-status').style.display = 'none';
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => setStatus('error', false);
  ws.onmessage = e => {
    const raw = e.data instanceof ArrayBuffer ? new TextDecoder().decode(e.data) : e.data;
    try { handleMsg(JSON.parse(raw)); } catch(err) { console.error(err); }
  };
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'ActorCreated':
      myActorId = msg.actor_id;
      addLog(`▶ Deployed as ${document.getElementById('inp-name').value} [id ${myActorId}]`, 'evt');
      document.getElementById('btn-join').disabled = true;
      document.getElementById('btn-leave').disabled = false;
      document.getElementById('sb-status').style.display = 'block';
      break;

    case 'WorldDelta':
      document.getElementById('st-tick').textContent = `TICK ${msg.tick}`;
      for (const a of msg.updates) {
        const prev = actors.get(a.id);
        actors.set(a.id, {
          id: a.id, name: a.name,
          wx: a.position.x, wy: a.position.y,
          col: Math.floor(a.position.x / WORLD_TILE),
          row: Math.floor(a.position.y / WORLD_TILE),
          utterance: a.last_utterance,
          role:    a.role    ?? 'Wanderer',
          faction: a.faction ?? 'Neutral',
          hp:      a.hp      ?? 80,
          max_hp:  a.max_hp  ?? 80,
          xp:      a.xp      ?? 0,
          level:   a.level   ?? 1,
        });
        if (a.last_utterance && a.last_utterance !== prev?.utterance)
          addLog(`[${a.name}] ${a.last_utterance}`, 'chat');
        if (a.id === myActorId) updatePlayerStatus(a);
        // Refresh selected actor panel if it's this actor
        if (selectedActor && selectedActor.id === a.id)
          selectedActor = actors.get(a.id);
      }
      for (const id of msg.removed) {
        if (selectedActor?.id === id) { selectedActor = null; document.getElementById('sb-unit').style.display = 'none'; }
        actors.delete(id);
      }
      break;

    case 'WorldEvent':
      handleWorldEvent(msg.message);
      break;

    case 'Error':
      addLog(`⚠ ${msg.message}`, 'err');
      if (msg.code === 409) {
        document.getElementById('btn-join').disabled = true;
        document.getElementById('btn-leave').disabled = false;
        document.getElementById('sb-status').style.display = 'block';
      }
      break;
  }
}

function handleWorldEvent(message) {
  let cls = 'evt', bcls = 'event';
  if (message.startsWith('⚔'))  { cls = 'combat';  bcls = 'combat'; }
  else if (message.startsWith('🏴')) { cls = 'capture'; bcls = 'capture'; }
  else if (message.startsWith('💀')) { cls = 'death';   bcls = 'death'; }
  else if (message.startsWith('⬆')) { cls = 'levelup'; bcls = 'levelup'; }
  addLog(message, cls);
  showBanner(message, bcls);

  // Combat: "⚔ X strikes Y for N damage!"
  const cm = message.match(/^⚔ (.+) strikes (.+) for (\d+) damage!/);
  if (cm) {
    const [,atkN,,dmg] = cm;
    const atk = findActorByName(atkN);
    if (atk) {
      combatFlashes.push({ col: atk.col, row: atk.row, born: performance.now(), dur: 600 });
      floatingNums.push({ wx: atk.wx, wy: atk.wy, text: `⚔${dmg}`, born: performance.now() });
    }
  }

  // Capture: "🏴 Faction has captured Zone!"
  const cap = message.match(/^🏴 (\w+) has captured (.+)!$/);
  if (cap) {
    const zid = ZONE_LABEL_TO_ID[cap[2]];
    if (zid) { territory[zid] = cap[1]; renderTerritoryPanel(); }
  }
}

function findActorByName(name) {
  for (const a of actors.values())
    if (a.name.toLowerCase() === name.toLowerCase()) return a;
  return null;
}

function send(obj) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ══════════════════════════════════════════════════════
// Actions
// ══════════════════════════════════════════════════════
function joinWorld() {
  const name = document.getElementById('inp-name').value.trim() || 'Wanderer';
  // Spawn near centre of the map
  const wx = 4500 + Math.random() * 1000;
  const wy = 4500 + Math.random() * 1000;
  // Pan viewport to spawn location
  vCol = Math.max(0, Math.floor(wx / WORLD_TILE) - Math.floor(visibleCols() / 2));
  vRow = Math.max(0, Math.floor(wy / WORLD_TILE) - Math.floor(visibleRows() / 2));
  send({
    type: 'CreateActor', name,
    personality: document.getElementById('inp-personality').value.trim(),
    backstory:   document.getElementById('inp-backstory').value.trim(),
    model:       document.getElementById('inp-model').value,
    position:    { x: wx, y: wy },
    role:        document.getElementById('inp-role').value,
    faction:     document.getElementById('inp-faction').value,
  });
}

function leaveWorld() {
  if (myActorId == null) return;
  send({ type: 'DestroyActor', actor_id: myActorId });
  myActorId = null;
  document.getElementById('btn-join').disabled = false;
  document.getElementById('btn-leave').disabled = true;
  document.getElementById('sb-status').style.display = 'none';
}

function sendChat() {
  const el = document.getElementById('inp-chat');
  const text = el.value.trim();
  if (!text || myActorId == null) return;
  send({ type: 'ChatActor', actor_id: myActorId, text });
  el.value = '';
}

// ══════════════════════════════════════════════════════
// Input
// ══════════════════════════════════════════════════════
function onMapClick(e) {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const col = vCol + Math.floor(px / TILE);
  const row = vRow + Math.floor(py / TILE);
  if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return;

  // Select actor in clicked cell
  const key = `${col},${row}`;
  const occupants = cellMap.get(key);
  if (occupants && occupants.length > 0) {
    selectedActor = occupants[0];
    showUnitPanel(selectedActor);
    return;
  }

  // No actor — move my actor there
  if (myActorId != null) {
    const wx = col * WORLD_TILE + WORLD_TILE / 2;
    const wy = row * WORLD_TILE + WORLD_TILE / 2;
    send({ type: 'MoveActor', actor_id: myActorId, to: { x: wx, y: wy } });
    // Optimistic update
    const me = actors.get(myActorId);
    if (me) { me.col = col; me.row = row; me.wx = wx; me.wy = wy; }
  }
}

function onMapMove(e) {
  const rect = canvas.getBoundingClientRect();
  cursorCol = vCol + Math.floor((e.clientX - rect.left) / TILE);
  cursorRow = vRow + Math.floor((e.clientY - rect.top)  / TILE);
  document.getElementById('coords').textContent =
    `col:${cursorCol} row:${cursorRow} (${cursorCol * WORLD_TILE}~${cursorRow * WORLD_TILE})`;
}

function onWheel(e) {
  e.preventDefault();
  if (e.ctrlKey) {
    const oldTile = TILE;
    TILE = Math.max(32, Math.min(80, TILE + (e.deltaY < 0 ? 4 : -4)));
    // Keep viewport centred on cursor col/row
    const dcol = cursorCol >= 0 ? cursorCol - vCol : visibleCols() / 2;
    const drow = cursorRow >= 0 ? cursorRow - vRow : visibleRows() / 2;
    vCol = Math.floor(cursorCol - (dcol * TILE / oldTile));
    vRow = Math.floor(cursorRow - (drow * TILE / oldTile));
  } else {
    vCol += Math.round(e.deltaX / TILE);
    vRow += Math.round(e.deltaY / TILE);
  }
  clampViewport();
}

function clampViewport() {
  vCol = Math.max(0, Math.min(MAP_COLS - 1, vCol));
  vRow = Math.max(0, Math.min(MAP_ROWS - 1, vRow));
}

// ══════════════════════════════════════════════════════
// Main Loop
// ══════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  handleKeys(ts);
  rebuildCellMap();
  drawMap(ts);
  drawMinimap();
}

let lastTs = 0;
function handleKeys(ts) {
  const dt = ts - lastTs; lastTs = ts;
  let moved = false;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) { vCol -= 1; moved = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { vCol += 1; moved = true; }
  if (keys['ArrowUp']    || keys['w'] || keys['W']) { vRow -= 1; moved = true; }
  if (keys['ArrowDown']  || keys['s'] || keys['S']) { vRow += 1; moved = true; }
  if (moved) clampViewport();
}

function rebuildCellMap() {
  cellMap.clear();
  for (const a of actors.values()) {
    const k = `${a.col},${a.row}`;
    if (!cellMap.has(k)) cellMap.set(k, []);
    cellMap.get(k).push(a);
  }
}

// ══════════════════════════════════════════════════════
// Rendering
// ══════════════════════════════════════════════════════
function drawMap(ts) {
  ctx.clearRect(0, 0, mapW, mapH);
  const cols = visibleCols();
  const rows = visibleRows();
  const now  = performance.now();

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const gc = vCol + c;
      const gr = vRow + r;
      if (gc >= MAP_COLS || gr >= MAP_ROWS || gc < 0 || gr < 0) {
        ctx.fillStyle = '#030507';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
        continue;
      }
      drawCell(gc, gr, c * TILE, r * TILE, now);
    }
  }

  // Floating damage numbers
  floatingNums = floatingNums.filter(n => now - n.born < 1200);
  for (const n of floatingNums) {
    const sc = Math.floor(n.wx / WORLD_TILE) - vCol;
    const sr = Math.floor(n.wy / WORLD_TILE) - vRow;
    const t  = (now - n.born) / 1200;
    const sx = sc * TILE + TILE / 2;
    const sy = sr * TILE + TILE / 2 - t * 30;
    ctx.globalAlpha = 1 - t;
    ctx.font = `bold ${Math.round(12 + 4 * (1 - t))}px Inter,sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff6655';
    ctx.fillText(n.text, sx, sy);
    ctx.globalAlpha = 1;
  }
}

function drawCell(gc, gr, sx, sy, now) {
  const wx   = gc * WORLD_TILE + WORLD_TILE / 2;
  const wy   = gr * WORLD_TILE + WORLD_TILE / 2;
  const zone = zoneOf(wx, wy);
  const ter  = ZONE_TERRAIN[zone];
  const owner = territory[zone];
  const key  = `${gc},${gr}`;
  const occupants = cellMap.get(key);

  // ── Cell background ──
  const isCursor = gc === cursorCol && gr === cursorRow;
  ctx.fillStyle = occupants ? ter.dim : ter.bg;
  ctx.fillRect(sx, sy, TILE, TILE);

  // Territory faction tint
  if (owner && owner !== 'Neutral') {
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = FACTION_COLOR[owner];
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.globalAlpha = 1;
  }

  // ── Grid line ──
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);

  // ── Terrain emoji (empty cells) ──
  if (!occupants && ter.emoji !== '·') {
    ctx.globalAlpha = 0.18;
    ctx.font = `${Math.floor(TILE * 0.38)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ter.emoji, sx + TILE / 2, sy + TILE / 2);
    ctx.globalAlpha = 1;
    ctx.textBaseline = 'alphabetic';
  }

  // ── Actor cell ──
  if (occupants && occupants.length > 0) {
    const a = occupants[0];
    const isMe = a.id === myActorId;
    const rs   = ROLE_STYLE[a.role] ?? ROLE_STYLE.Wanderer;
    const fc   = FACTION_COLOR[a.faction] ?? '#888888';

    // Combat flash overlay
    const flash = combatFlashes.find(f => f.col === gc && f.row === gr);
    if (flash) {
      const t = (now - flash.born) / flash.dur;
      if (now - flash.born < flash.dur) {
        ctx.globalAlpha = 0.55 * (1 - t) * (Math.sin(t * Math.PI * 6) * 0.5 + 0.5);
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.globalAlpha = 1;
      } else {
        combatFlashes.splice(combatFlashes.indexOf(flash), 1);
      }
    }

    // Faction border (3px inside)
    ctx.strokeStyle = fc;
    ctx.lineWidth = isMe ? 3 : 2;
    ctx.strokeRect(sx + 1.5, sy + 1.5, TILE - 3, TILE - 3);

    // Role emoji (large, centered)
    const emojiSz = Math.floor(TILE * 0.42);
    ctx.font = `${emojiSz}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(rs.emoji, sx + TILE / 2, sy + TILE / 2 - 5);
    ctx.textBaseline = 'alphabetic';

    // Name (small, below emoji)
    if (TILE >= 44) {
      const fs = Math.max(7, Math.min(10, TILE * 0.18));
      ctx.font = `${isMe ? 500 : 400} ${fs}px Inter,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = isMe ? '#ffffff' : '#c0cce0';
      ctx.fillText(truncate(a.name, 9), sx + TILE / 2, sy + TILE - 14);
    }

    // HP bar (very bottom of cell)
    const bw = TILE - 8, bh = 3;
    const bx = sx + 4, by = sy + TILE - 7;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by, bw, bh);
    const hpr = Math.max(0, a.hp / a.max_hp);
    ctx.fillStyle = hpr > 0.6 ? '#38d890' : hpr > 0.3 ? '#e8b840' : '#ff4455';
    ctx.fillRect(bx, by, Math.round(bw * hpr), bh);

    // Multi-actor badge
    if (occupants.length > 1) {
      ctx.fillStyle = '#ff4455';
      ctx.beginPath();
      ctx.arc(sx + TILE - 8, sy + 8, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = `bold 8px Inter,sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText(occupants.length, sx + TILE - 8, sy + 11);
    }

    // My-unit indicator (corner star)
    if (isMe) {
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('★', sx + 3, sy + 12);
    }

    // Selected highlight
    if (selectedActor?.id === a.id) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(sx + 2.5, sy + 2.5, TILE - 5, TILE - 5);
      ctx.setLineDash([]);
    }
  }

  // ── Cursor highlight ──
  if (isCursor) {
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(sx + 0.5, sy + 0.5, TILE - 1, TILE - 1);
    ctx.setLineDash([]);
  }
}

function drawMinimap() {
  const mw = 110, mh = 110;
  const cs = mw / MAP_COLS; // cell size on minimap (=2.2px)

  mctx.clearRect(0, 0, mw, mh);

  // Draw zone backgrounds
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const wx = c * WORLD_TILE + WORLD_TILE / 2;
      const wy = r * WORLD_TILE + WORLD_TILE / 2;
      const zone = zoneOf(wx, wy);
      const ter  = ZONE_TERRAIN[zone];
      mctx.fillStyle = ter.bg;
      mctx.fillRect(c * cs, r * cs, cs, cs);
    }
  }

  // Territory tints
  for (const [zid, owner] of Object.entries(territory)) {
    if (!owner || owner === 'Neutral') continue;
    mctx.globalAlpha = 0.22;
    mctx.fillStyle = FACTION_COLOR[owner] ?? '#888';
    // Paint all cells of this zone
    for (let r = 0; r < MAP_ROWS; r++) {
      for (let c = 0; c < MAP_COLS; c++) {
        const wx = c * WORLD_TILE + WORLD_TILE / 2;
        const wy = r * WORLD_TILE + WORLD_TILE / 2;
        if (zoneOf(wx, wy) === zid) mctx.fillRect(c * cs, r * cs, cs, cs);
      }
    }
    mctx.globalAlpha = 1;
  }

  // Actors
  for (const a of actors.values()) {
    const isMe = a.id === myActorId;
    mctx.fillStyle = isMe ? '#ffffff' : (FACTION_COLOR[a.faction] ?? '#888');
    mctx.fillRect(a.col * cs - 1, a.row * cs - 1, isMe ? 3 : 2, isMe ? 3 : 2);
  }

  // Viewport rect
  const vcols = visibleCols(), vrows = visibleRows();
  mctx.strokeStyle = 'rgba(232,184,64,0.7)';
  mctx.lineWidth = 1;
  mctx.strokeRect(vCol * cs, vRow * cs, vcols * cs, vrows * cs);

  // Border
  mctx.strokeStyle = 'rgba(80,120,200,0.3)';
  mctx.strokeRect(0, 0, mw, mh);
}

// ══════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════
function showUnitPanel(a) {
  const rs = ROLE_STYLE[a.role] ?? ROLE_STYLE.Wanderer;
  const fc = FACTION_COLOR[a.faction] ?? '#888';
  document.getElementById('sb-unit').style.display = 'block';
  document.getElementById('u-emoji').textContent = rs.emoji;
  document.getElementById('u-name').textContent  = a.name;
  document.getElementById('u-sub').textContent   = `${FACTION_NAME[a.faction] ?? a.faction} · ${a.role}`;
  document.getElementById('u-sub').style.color   = fc;
  document.getElementById('u-hp').textContent    = `${a.hp}/${a.max_hp}`;
  document.getElementById('u-lv').textContent    = a.level;
  document.getElementById('u-xp').textContent    = `${a.xp % 100}/100`;
  document.getElementById('u-atk').textContent   = `${10 + a.level * 5}`;
}

function updatePlayerStatus(a) {
  const rs  = ROLE_STYLE[a.role] ?? ROLE_STYLE.Wanderer;
  const xpL = a.xp % 100;
  document.getElementById('pl-lv').textContent       = `${rs.emoji} Level ${a.level}`;
  document.getElementById('pl-hp-text').textContent  = `${a.hp}/${a.max_hp}`;
  document.getElementById('pl-hp').style.width       = `${(a.hp / a.max_hp * 100).toFixed(0)}%`;
  document.getElementById('pl-xp-text').textContent  = `${xpL}/100`;
  document.getElementById('pl-xp').style.width       = `${xpL}%`;
}

function renderTerritoryPanel() {
  const zones = ['NorthForest','EastDesert','WestCoast','SouthPlain','CentralCity','MountainBorder'];
  for (const id of zones) {
    const el = document.getElementById(`tz-${id}`);
    if (!el) continue;
    const owner = territory[id] ?? 'Neutral';
    el.textContent   = `${FACTION_EMOJI[owner] ?? '⚪'} ${FACTION_NAME[owner] ?? owner}`;
    el.style.color   = FACTION_COLOR[owner] ?? '#888';
  }
}

function showBanner(text, cls) {
  const el = document.getElementById('banner');
  el.textContent = text;
  el.className   = `${cls} show`;
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => el.className = cls, 5000);
}

function addLog(msg, cls) {
  const el  = document.getElementById('sb-log');
  const div = document.createElement('div');
  div.className = `log-line ${cls || ''}`;
  div.textContent = `${hhmm()} ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 150) el.removeChild(el.firstChild);
}

function setStatus(text, ok) {
  const dot = document.getElementById('dot');
  dot.className = ok ? 'dot on' : 'dot';
  document.getElementById('st-text').textContent = text;
}

function pollMetrics() {
  fetch(`${HTTP_URL}/health`)
    .then(r => r.json())
    .then(m => {
      document.getElementById('st-actors').textContent = `${m.actors ?? '—'} actors`;
      document.getElementById('st-uptime').textContent =
        m.uptime_secs != null ? `uptime ${fmtUp(m.uptime_secs)}` : 'uptime —';
    })
    .catch(() => {})
    .finally(() => setTimeout(pollMetrics, 5000));
}

// ══════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }
function hhmm() { return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function fmtUp(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m ${s % 60}s`;
}
