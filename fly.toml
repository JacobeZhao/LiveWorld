# Fly.io deployment — single port 8080 handles both HTTP and WebSocket.
# Deploy:
#   fly launch --no-deploy --name liveworld --region sin
#   fly volumes create liveworld_data --size 1 --region sin
#   fly secrets set JWT_SECRET="your-32-plus-char-secret"
#   fly deploy

app            = "liveworld"
primary_region = "sin"

[build]

[env]
  RUST_LOG = "info"

[vm]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

# Single service: 443 (HTTPS/WSS) → internal 8080
[[services]]
  internal_port        = 8080
  protocol             = "tcp"
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [[services.http_checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "get"
    path         = "/health"
    port         = 8080
    timeout      = "2s"
    type         = "http"

# Persistent volume for snapshots
[[mounts]]
  source      = "liveworld_data"
  destination = "/app/data"
