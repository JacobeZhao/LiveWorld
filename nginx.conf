# Nginx reverse-proxy for LiveWorld
# Handles TLS termination (WSS + HTTPS) and proxies to the app.
#
# Usage:
#   1. Obtain a TLS certificate (e.g., Let's Encrypt / certbot).
#   2. Place cert/key paths in ssl_certificate / ssl_certificate_key.
#   3. Run: nginx -c /path/to/this/nginx.conf
#
# App ports (internal, plain):
#   8080 → WebSocket
#   8081 → HTTP metrics + frontend

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 65536;
    use epoll;
    multi_accept on;
}

http {
    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream liveworld_ws {
        least_conn;
        server 127.0.0.1:8080;
        # Add more nodes for horizontal scaling:
        # server 10.0.0.2:8080;
        # server 10.0.0.3:8080;
        keepalive 256;
    }

    upstream liveworld_http {
        server 127.0.0.1:8081;
        keepalive 64;
    }

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS / WSS server ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name liveworld.example.com;  # ← change to your domain

        ssl_certificate     /etc/letsencrypt/live/liveworld.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/liveworld.example.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── WebSocket (WSS → WS) ─────────────────────────────────────────────
        location /ws {
            limit_req zone=ws_limit burst=20 nodelay;
            limit_conn addr 50;

            proxy_pass http://liveworld_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout  86400s;  # keep WS connections alive
            proxy_send_timeout  86400s;
            proxy_buffering     off;
        }

        # ── Metrics + Frontend ───────────────────────────────────────────────
        location / {
            proxy_pass http://liveworld_http;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Cache static assets
            location ~* \.(html|js|css|png|svg|ico)$ {
                proxy_pass http://liveworld_http;
                proxy_cache_valid 200 1h;
                add_header Cache-Control "public, max-age=3600";
            }
        }

        # Restrict /metrics to internal network only
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://liveworld_http/metrics;
        }
    }
}
